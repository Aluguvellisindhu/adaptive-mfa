<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SecureAuth — Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <style>
    :root{
      --bg:#050a0e;--surface:#0c1419;--surface2:#111d24;
      --border:#1a2e3a;--accent:#00d4ff;--accent2:#00ff9d;
      --text:#e8f4f8;--muted:#4a6a7a;
      --font-display:'Syne',sans-serif;--font-mono:'Space Mono',monospace;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--text);font-family:var(--font-mono);min-height:100vh;}
    .bg-grid{position:fixed;inset:0;z-index:0;
      background-image:linear-gradient(rgba(0,212,255,.04) 1px,transparent 1px),
                       linear-gradient(90deg,rgba(0,212,255,.04) 1px,transparent 1px);
      background-size:40px 40px;animation:gridMove 20s linear infinite;}
    @keyframes gridMove{0%{background-position:0 0}100%{background-position:40px 40px}}
    .content{position:relative;z-index:10;padding:2rem}
    .navbar-custom{background:var(--surface);border-bottom:1px solid var(--border);
                   padding:.9rem 2rem;display:flex;align-items:center;justify-content:space-between;
                   position:relative;z-index:10;}
    .brand-text{font-family:var(--font-display);font-weight:800;font-size:1.1rem;
                letter-spacing:.08em;color:var(--text)}
    .brand-text span{color:var(--accent)}
    .btn-logout{background:transparent;border:1px solid var(--border);border-radius:2px;
                color:var(--muted);font-family:var(--font-mono);font-size:.72rem;
                letter-spacing:.1em;text-transform:uppercase;padding:.45rem .9rem;
                cursor:pointer;transition:all .2s}
    .btn-logout:hover{border-color:#ff4757;color:#ff4757}
    .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:2px;
               padding:1.5rem;margin-bottom:1.5rem;
               box-shadow:inset 0 1px 0 rgba(0,212,255,.06);
               animation:fadeUp .5s ease both;}
    @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
    .stat-card:nth-child(2){animation-delay:.1s}
    .stat-card:nth-child(3){animation-delay:.2s}
    .card-label{font-size:.65rem;letter-spacing:.15em;text-transform:uppercase;
                color:var(--muted);margin-bottom:.6rem}
    .card-value{font-family:var(--font-display);font-size:1.8rem;font-weight:800;color:var(--accent)}
    .card-sub{font-size:.72rem;color:var(--muted);margin-top:.3rem}
    .tier-badge{display:inline-flex;align-items:center;gap:.5rem;
                padding:.4rem .8rem;border-radius:2px;font-size:.72rem;
                letter-spacing:.1em;text-transform:uppercase;font-weight:700}
    .tier-low   {background:rgba(0,255,157,.1);color:#00ff9d;border:1px solid rgba(0,255,157,.3)}
    .tier-medium{background:rgba(255,165,2,.1);color:#ffa502;border:1px solid rgba(255,165,2,.3)}
    .tier-high  {background:rgba(255,71,87,.1);color:#ff4757;border:1px solid rgba(255,71,87,.3)}
    .dot{width:7px;height:7px;border-radius:50%;background:currentColor;
         animation:blink 1.4s ease-in-out infinite}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
    .access-banner{background:rgba(0,255,157,.05);border:1px solid rgba(0,255,157,.2);
                   border-left:3px solid var(--accent2);border-radius:2px;
                   padding:1rem 1.25rem;margin-bottom:2rem;
                   display:flex;align-items:center;gap:.75rem;
                   animation:fadeUp .4s ease both}
    .access-banner i{color:var(--accent2);font-size:1.2rem}
    .access-banner p{margin:0;font-size:.8rem;color:var(--accent2);letter-spacing:.04em}
    .access-banner small{color:var(--muted);font-size:.68rem}
    .section-title{font-size:.68rem;letter-spacing:.18em;text-transform:uppercase;
                   color:var(--muted);margin-bottom:1rem;padding-bottom:.5rem;
                   border-bottom:1px solid var(--border)}
  </style>
</head>
<body>
<div class="bg-grid"></div>

<div class="navbar-custom">
  <div class="brand-text">Secure<span>Auth</span></div>
  <button class="btn-logout" onclick="logout()">
    <i class="bi bi-box-arrow-right me-1"></i>Logout
  </button>
</div>

<div class="content">
  <div class="container-fluid" style="max-width:900px;margin:0 auto">

    <div class="access-banner">
      <i class="bi bi-shield-check-fill"></i>
      <div>
        <p>Access Granted — Adaptive MFA Complete</p>
        <small id="loginTime">Authenticated successfully</small>
      </div>
    </div>

    <div class="section-title">Session Overview</div>

    <div class="row">
      <div class="col-md-4">
        <div class="stat-card">
          <div class="card-label">Risk Tier</div>
          <div id="tierBadge">
            <span class="tier-badge tier-low"><span class="dot"></span>Low Risk</span>
          </div>
          <div class="card-sub" id="tierDesc" style="margin-top:.6rem">Password only required</div>
        </div>
      </div>

      <div class="col-md-4">
        <div class="stat-card">
          <div class="card-label">Risk Score</div>
          <div class="card-value" id="riskScore">—</div>
          <div class="card-sub">out of 10 points</div>
        </div>
      </div>

      <div class="col-md-4">
        <div class="stat-card">
          <div class="card-label">Auth Methods Used</div>
          <div class="card-value" id="authMethods">—</div>
          <div class="card-sub" id="methodDesc">factors verified</div>
        </div>
      </div>
    </div>

    <div class="section-title" style="margin-top:1rem">Security Signals</div>

    <div class="stat-card">
      <div id="signalsList" style="display:grid;gap:.6rem">
        <div style="color:var(--muted);font-size:.78rem">Loading signals…</div>
      </div>
    </div>

  </div>
</div>

<script>
window.addEventListener('DOMContentLoaded', () => {
  const tier  = sessionStorage.getItem('risk_tier')  || 'low';
  const score = sessionStorage.getItem('risk_score') || '0';

  const tierMap = {
    low:    {cls:'tier-low',    label:'Low Risk',    desc:'Password only required',            methods:'1'},
    medium: {cls:'tier-medium', label:'Medium Risk', desc:'Password + OTP verified',           methods:'2'},
    high:   {cls:'tier-high',   label:'High Risk',   desc:'Password + OTP + Face ID verified', methods:'3'},
  };
  const t = tierMap[tier] || tierMap.low;

  document.getElementById('tierBadge').innerHTML =
    `<span class="tier-badge ${t.cls}"><span class="dot"></span>${t.label}</span>`;
  document.getElementById('tierDesc').textContent    = t.desc;
  document.getElementById('riskScore').textContent   = score;
  document.getElementById('authMethods').textContent = t.methods;
  document.getElementById('methodDesc').textContent  =
    t.methods === '1' ? 'factor verified' : 'factors verified';

  document.getElementById('loginTime').textContent =
    'Authenticated at ' + new Date().toLocaleTimeString();

  const signals = JSON.parse(sessionStorage.getItem('signals') || '{}');
  const list    = document.getElementById('signalsList');
  const names   = {
    new_device:       'New Device Fingerprint',
    unknown_location: 'Unknown Geographic Location',
    brute_force:      'Repeated Failed Attempts',
    off_hours:        'Off-Hours Login (23:00–05:00)',
    unseen_ip:        'IP Not Seen in 30 Days',
  };

  if (Object.keys(signals).length === 0) {
    list.innerHTML = '<div style="color:var(--muted);font-size:.78rem">No signal data available.</div>';
    return;
  }

  list.innerHTML = Object.entries(signals).map(([key, val]) => `
    <div style="display:flex;align-items:center;justify-content:space-between;
                padding:.5rem .75rem;background:var(--surface2);border-radius:2px;
                border-left:2px solid ${val.triggered ? '#ff4757' : '#00ff9d'}">
      <span style="font-size:.75rem;color:var(--text)">${names[key] || key}</span>
      <span style="font-size:.72rem;color:${val.triggered ? '#ff4757' : '#00ff9d'};
                   letter-spacing:.08em;text-transform:uppercase">
        ${val.triggered ? '▲ +' + val.points + ' pts' : '✓ Clear'}
      </span>
    </div>
  `).join('');
});

async function logout() {
  await fetch('/api/auth/logout', {method:'POST'}).catch(()=>{});
  sessionStorage.clear();
  window.location.href = '/login';
}
</script>
</body>
</html>
